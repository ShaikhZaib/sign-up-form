<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign-up-form</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <aside>
        <div class="logo">
          <div class="logo-image">
            <img src="odin-lined.png" alt="logo-image" />
          </div>
          <div class="logo-text">Odin</div>
        </div>
        <div class="credit">Photo by Halle West on unsplash</div>
      </aside>
      <section>
        <div class="intro">
          <p>
            You know you need something like this in your life to help you
            realize your deepest dreams Sign up <em>now</em> to get started
          </p>
          <p>You <em>know</em> you want to.</p>
        </div>
        <div class="form-container">
          <form action="">
            <h2>Let's do this!</h2>
            <div class="form-row">
              <div class="form-group">
                <label for="first-name">FIRST NAME</label>
                <input type="text" name="first-name" id="first-name" required />
              </div>
              <div class="form-group">
                <label for="last-name">LAST NAME</label>
                <input type="text" name="last-name" id="last-name" required />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="mail">EMAIL</label>
                <input type="email" name="mail" id="mail" required />
              </div>
              <div class="form-group">
                <label for="phone-number">PHONE NUMBER</label>
                <input
                  type="tel"
                  name="phone-number"
                  id="phone-number"
                  required
                />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="password">PASSWORD</label>
                <input
                  type="password"
                  name="password"
                  id="password"
                  required
                  minlength="8"
                />
              </div>
              <div class="form-group">
                <label for="confirm-password">CONFIRM PASSWORD</label>
                <input
                  type="password"
                  name="confirm-password"
                  id="confirm-password"
                  required
                  minlength="8"
                />
              </div>
            </div>
          </form>
        </div>
        <div class="footer">
          <button>Create Account</button>
          <p>Already have an account? <a href="">Log in</a></p>
        </div>
      </section>
    </main>
  </body>
</html>
